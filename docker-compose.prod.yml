# Hermes OS — Production Compose
#
# Default SSL strategy: Nginx + Certbot (Let's Encrypt).
# See deploy/ssl/README.md for Cloudflare and external-proxy alternatives.
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#
# With monitoring (ideally on a separate host — see deploy/monitoring/README.md):
#   docker-compose -f docker-compose.prod.yml --profile monitoring up -d
#
# First run — apply migrations before starting the app:
#   docker-compose -f docker-compose.prod.yml run --rm hermes-web \
#     node -e "const {execSync}=require('child_process'); execSync('npx prisma migrate deploy', {stdio:'inherit'})"

services:
  hermes-web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hermes_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hermes_internal
    # No public port — internal network only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes} -d ${POSTGRES_DB:-hermes_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-changeme}"
    volumes:
      - redis_data:/data
    networks:
      - hermes_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Certbot SSL certificates (managed by Certbot on the VPS — see deploy/ssl/README.md)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Certbot ACME webroot challenge directory
      - ./deploy/certbot/www:/var/www/certbot:ro
    depends_on:
      - hermes-web
    networks:
      - hermes_internal
    healthcheck:
      test: ["CMD-SHELL", "nginx -t 2>/dev/null && wget -qO- http://localhost/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Optional monitoring ────────────────────────────────────────────────────
  # NOTE: For real production, run Uptime Kuma on a SEPARATE VPS so monitoring
  # survives app downtime. This profile is provided for single-server setups.
  # Start with: docker-compose -f docker-compose.prod.yml --profile monitoring up -d
  uptime-kuma:
    image: louislam/uptime-kuma:1
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - hermes_internal

volumes:
  postgres_data:
  redis_data:
  uptime_kuma_data:

networks:
  hermes_internal:
    driver: bridge
