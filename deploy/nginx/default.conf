# Hermes OS — Nginx Production Reverse Proxy
# SSL Strategy: Nginx + Certbot (Let's Encrypt) — DEFAULT
# See deploy/ssl/README.md for Cloudflare and external-proxy alternatives.
#
# Before enabling the HTTPS block:
#   1. Replace "yourdomain.com" with your actual domain everywhere in this file.
#   2. Run Certbot to obtain certificates (see deploy/ssl/README.md).
#   3. Uncomment the HTTPS server block.

# ── HTTP: redirect to HTTPS + serve Certbot ACME challenge ────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Certbot webroot challenge — must be served BEFORE redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

